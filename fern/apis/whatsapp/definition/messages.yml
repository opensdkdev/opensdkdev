imports:
  common: common.yml
  flows: flows.yml

types:
  # ---------------------------------------------------------------------------
  # Enums
  # ---------------------------------------------------------------------------
  MessageType:
    enum:
      - text
      - reaction
      - location
      - audio
      - document
      - image
      - video
      - sticker
      - interactive
      - template
      - contacts

  InteractiveActionType:
    enum:
      - button
      - catalog_message
      - list
      - product
      - product_list
      - flow

  TemplateComponentType:
    enum:
      - header
      - body
      - footer
      - button

  TemplateParameterType:
    enum:
      - text
      - currency
      - date_time
      - image
      - video
      - document

  TemplateButtonSubType:
    enum:
      - quick_reply
      - url
      - copy_code
      - CATALOG

  TemplateButtonParameterType:
    enum:
      - payload
      - text
      - coupon_code
      - action

  InteractiveFlowAction:
    enum:
      - navigate
      - data_exchange

  FlowMode:
    enum:
      - draft
      - published

  # ---------------------------------------------------------------------------
  # Text Message
  # ---------------------------------------------------------------------------
  TextMessage:
    properties:
      body: string
      preview_url: optional<boolean>

  # ---------------------------------------------------------------------------
  # Reaction Message
  # ---------------------------------------------------------------------------
  ReactionMessage:
    properties:
      message_id: string
      emoji: string

  # ---------------------------------------------------------------------------
  # Location Message
  # ---------------------------------------------------------------------------
  LocationMessage:
    properties:
      latitude: double
      longitude: double
      name: string
      address: string

  # ---------------------------------------------------------------------------
  # Media Messages (with id/link variants)
  # ---------------------------------------------------------------------------
  ImageMessage:
    discriminated: false
    union:
      - ImageById
      - ImageByLink

  ImageById:
    properties:
      id: string
      caption: optional<string>

  ImageByLink:
    properties:
      link: string
      caption: optional<string>

  DocumentMessage:
    discriminated: false
    union:
      - DocumentById
      - DocumentByLink

  DocumentById:
    properties:
      id: string
      caption: optional<string>
      filename: optional<string>

  DocumentByLink:
    properties:
      link: string
      caption: optional<string>
      filename: optional<string>

  AudioMessage:
    discriminated: false
    union:
      - AudioById
      - AudioByLink

  AudioById:
    properties:
      id: string

  AudioByLink:
    properties:
      link: string

  VideoMessage:
    discriminated: false
    union:
      - VideoById
      - VideoByLink

  VideoById:
    properties:
      id: string
      caption: optional<string>

  VideoByLink:
    properties:
      link: string
      caption: optional<string>

  StickerMessage:
    discriminated: false
    union:
      - StickerById
      - StickerByLink

  StickerById:
    properties:
      id: string

  StickerByLink:
    properties:
      link: string

  # ---------------------------------------------------------------------------
  # Contact Message
  # ---------------------------------------------------------------------------
  ContactName:
    properties:
      formatted_name: string
      first_name: optional<string>
      last_name: optional<string>
      middle_name: optional<string>
      prefix: optional<string>
      suffix: optional<string>

  ContactPhone:
    properties:
      phone: string
      type: optional<string>
      wa_id: optional<string>

  ContactAddress:
    properties:
      street: optional<string>
      city: optional<string>
      state: optional<string>
      zip: optional<string>
      country: optional<string>
      country_code: optional<string>
      type: optional<string>

  ContactEmail:
    properties:
      email: optional<string>
      type: optional<string>

  ContactUrl:
    properties:
      url: optional<string>
      type: optional<string>

  ContactOrg:
    properties:
      company: optional<string>
      department: optional<string>
      title: optional<string>

  Contact:
    properties:
      name: ContactName
      phones: list<ContactPhone>
      addresses: optional<list<ContactAddress>>
      emails: optional<list<ContactEmail>>
      urls: optional<list<ContactUrl>>
      org: optional<ContactOrg>
      birthday: optional<string>

  ContactMessage:
    type: list<Contact>

  # ---------------------------------------------------------------------------
  # Template Message
  # ---------------------------------------------------------------------------
  TemplateLanguage:
    properties:
      code: common.LanguageTag

  TemplateComponent:
    discriminated: false
    union:
      - TemplateHeaderBodyFooterComponent
      - TemplateButtonComponent

  TemplateHeaderBodyFooterComponent:
    properties:
      type: TemplateComponentType
      parameters: optional<list<TemplateParameter>>

  TemplateCurrency:
    properties:
      fallback_value: string
      code: string
      amount_1000: integer

  TemplateDateTime:
    properties:
      fallback_value: string
      day_of_week: optional<integer>
      year: optional<integer>
      month: optional<integer>
      day_of_month: optional<integer>
      hour: optional<integer>
      minute: optional<integer>
      calendar: optional<string>

  TemplateParameter:
    properties:
      type: TemplateParameterType
      text: optional<string>
      currency: optional<TemplateCurrency>
      date_time: optional<TemplateDateTime>
      image: optional<ImageByLink>
      video: optional<VideoByLink>
      document: optional<DocumentByLink>

  TemplateCatalogAction:
    properties:
      thumbnail_product_retailer_id: string

  TemplateButtonComponent:
    properties:
      type:
        type: literal<"button">
      sub_type: TemplateButtonSubType
      index: unknown
      parameters: list<TemplateButtonParameter>

  TemplateButtonParameter:
    properties:
      type: TemplateButtonParameterType
      payload: optional<string>
      text: optional<string>
      coupon_code: optional<string>
      action: optional<TemplateCatalogAction>

  TemplateMessage:
    properties:
      name: string
      language: TemplateLanguage
      namespace: optional<string>
      components: optional<list<TemplateComponent>>

  # ---------------------------------------------------------------------------
  # Interactive Message
  # ---------------------------------------------------------------------------
  InteractiveTextHeader:
    properties:
      type:
        type: literal<"text">
      text: string
      sub_text: optional<string>

  InteractiveVideoHeader:
    properties:
      type:
        type: literal<"video">
      video: VideoByLink

  InteractiveDocumentHeader:
    properties:
      type:
        type: literal<"document">
      document: DocumentByLink

  InteractiveImageHeader:
    properties:
      type:
        type: literal<"image">
      image: ImageByLink

  InteractiveHeader:
    discriminated: false
    union:
      - InteractiveTextHeader
      - InteractiveVideoHeader
      - InteractiveDocumentHeader
      - InteractiveImageHeader

  InteractiveBody:
    properties:
      text: string

  InteractiveFooter:
    properties:
      text: string

  InteractiveFlowParameters:
    properties:
      flow_message_version: optional<string>
      flow_token: optional<string>
      flow_name: optional<string>
      flow_cta: optional<string>
      flow_action: optional<InteractiveFlowAction>
      flow_action_payload: optional<flows.FlowActionPayload>
      mode: FlowMode

  InteractiveButtonReplyContent:
    properties:
      title: string
      id: string

  InteractiveActionButtonReply:
    properties:
      type:
        type: literal<"reply">
      reply: InteractiveButtonReplyContent

  InteractiveSectionRow:
    properties:
      id: string
      title: string
      description: optional<string>

  InteractiveProductItem:
    properties:
      product_retailer_id: string

  InteractiveSection:
    properties:
      title: string
      rows: list<InteractiveSectionRow>
      product_items: optional<list<InteractiveProductItem>>

  InteractiveAction:
    properties:
      name: optional<string>
      parameters: optional<InteractiveFlowParameters>
      button: optional<string>
      buttons: optional<list<InteractiveActionButtonReply>>
      catalog_id: optional<string>
      product_retailer_id: optional<string>
      sections: optional<list<InteractiveSection>>
      mode: optional<FlowMode>

  InteractiveMessage:
    properties:
      type: InteractiveActionType
      body: optional<InteractiveBody>
      footer: optional<InteractiveFooter>
      header: optional<InteractiveHeader>
      action: InteractiveAction

  # ---------------------------------------------------------------------------
  # Send Message Request/Response
  # ---------------------------------------------------------------------------
  SendMessageContext:
    properties:
      message_id: string

  SendMessageRequest:
    properties:
      messaging_product:
        type: literal<"whatsapp">
      to: string
      type: MessageType
      preview_url: optional<boolean>
      recipient_type: optional<string>
      biz_opaque_callback_data: optional<string>
      context: optional<SendMessageContext>
      text: optional<TextMessage>
      reaction: optional<ReactionMessage>
      location: optional<LocationMessage>
      audio: optional<AudioMessage>
      document: optional<DocumentMessage>
      image: optional<ImageMessage>
      video: optional<VideoMessage>
      sticker: optional<StickerMessage>
      interactive: optional<InteractiveMessage>
      template: optional<TemplateMessage>
      contacts: optional<ContactMessage>

  SendMessageContactProfile:
    properties:
      name: string

  SendMessageContactResult:
    properties:
      wa_id: string
      profile: SendMessageContactProfile

  SendMessageMessageResult:
    properties:
      id: string

  SendMessageResponse:
    properties:
      messaging_product:
        type: literal<"whatsapp">
      contacts: list<SendMessageContactResult>
      messages: list<SendMessageMessageResult>

  # ---------------------------------------------------------------------------
  # Typing Indicator
  # ---------------------------------------------------------------------------
  TypingIndicator:
    properties:
      type:
        type: literal<"text">

  ShowTypingIndicatorRequest:
    properties:
      messaging_product:
        type: literal<"whatsapp">
      status:
        type: literal<"read">
      message_id: string
      typing_indicator: TypingIndicator

  ShowTypingIndicatorResponse:
    properties:
      success: boolean

service:
  base-path: ""
  auth: true
  endpoints:
    sendMessage:
      docs: Send a ssage (text, media, interactive, template, contacts, etc.)
      url: graph
      path: /{numberId}/messages
      method: POST
      path-parameters:
        numberId:
          docs: one number ID
          type: string
      request:
        name: SendMessageWrapper
        body: SendMessageRequest
      response: SendMessageResponse

    showTypingIndicator:
      docs: >
        Show a "typing…" indicator to the recipient. Send this before
        sending the actual message for a more natural conversation flow.
      url: graph
      path: /{numberId}/messages
      method: POST
      path-parameters:
        numberId: string
      request:
        name: ShowTypingIndicatorWrapper
        body: ShowTypingIndicatorRequest
      response: ShowTypingIndicatorResponse
