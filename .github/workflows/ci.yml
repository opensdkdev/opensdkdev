name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: Bypass Turbo cache for this run
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Provision and Build SDKs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Cache Turbo artifacts
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml', 'turbo.json', 'packages/*/package.json', 'packages/*/fern/**', 'scripts/**', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate publishing secrets
        env:
          GH_TOKEN_VALUE: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN_VALUE: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN_VALUE" ]; then
            echo "Missing secret GH_TOKEN" >&2
            exit 1
          fi

          if [ -z "$NPM_TOKEN_VALUE" ]; then
            echo "Missing secret NPM_TOKEN" >&2
            exit 1
          fi

      - name: Build SDK packages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm turbo run ci:publish --cache=local:rw --force
