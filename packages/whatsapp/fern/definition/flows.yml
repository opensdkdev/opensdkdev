imports:
  common: common.yml
  messages: messages.yml

types:
  # ---------------------------------------------------------------------------
  # Enums
  # ---------------------------------------------------------------------------
  FlowCategory:
    enum:
      - SIGN_UP
      - SIGN_IN
      - APPOINTMENT_BOOKING
      - LEAD_GENERATION
      - CONTACT_US
      - CUSTOMER_SUPPORT
      - SURVEY
      - OTHER

  FlowStatus:
    enum:
      - DRAFT
      - PUBLISHED
      - DEPRECATED
      - BLOCKED
      - THROTTLED

  FlowCanSendMessageStatus:
    enum:
      - AVAILABLE
      - LIMITED
      - BLOCKED

  FlowAction:
    enum:
      - name: INIT
        value: INIT
      - name: BACK
        value: BACK
      - name: data_exchange
        value: data_exchange
      - name: navigate
        value: navigate
      - name: ping
        value: ping

  # ---------------------------------------------------------------------------
  # Flow Data Models
  # ---------------------------------------------------------------------------
  FlowValidationError:
    properties:
      error: string
      error_type: string
      message: string
      line_start: integer
      line_end: integer
      column_start: integer
      column_end: integer

  FlowMediaEncryptionMetadata:
    properties:
      encrypted_hash: string
      iv: string
      encryption_key: string
      hmac_key: string
      plaintext_hash: string

  FlowMedia:
    properties:
      media_id: string
      cdn_url: string
      file_name: string
      encryption_metadata: FlowMediaEncryptionMetadata

  FlowMetadata:
    properties:
      name: string
      categories: list<FlowCategory>
      application_id: optional<string>
      endpoint_uri: optional<string>

  FlowPreview:
    properties:
      preview_url: string
      expires_at: string

  FlowPreviewParams:
    properties:
      interactive: optional<boolean>
      flow_token: optional<string>
      flow_action: optional<messages.InteractiveFlowAction>
      flow_action_payload: optional<FlowActionPayload>
      phone_number: optional<string>
      debug: optional<boolean>

  FlowHealthStatus:
    properties:
      can_send_message: FlowCanSendMessageStatus

  FlowValidationResult:
    properties:
      validation_errors: list<FlowValidationError>

  # ---------------------------------------------------------------------------
  # Flow Response Models
  # ---------------------------------------------------------------------------
  FlowSummary:
    docs: Summary row returned in list responses.
    properties:
      id: string
      name: string
      status: FlowStatus
      categories: list<FlowCategory>
      validation_errors: list<FlowValidationError>

  FlowDetail:
    docs: Full flow detail returned by a single-flow read.
    extends: FlowSummary
    properties:
      json_version: optional<string>
      data_api_version: optional<string>
      endpoint_uri: optional<string>
      preview: optional<FlowPreviewResponse>
      health_status: optional<FlowHealthStatus>

  FlowPreviewResponse:
    properties:
      id: string
      preview: FlowPreview

  FlowActionPayload:
    properties:
      screen: string
      data: map<string, unknown>

  # ---------------------------------------------------------------------------
  # Request/Response DTOs
  # ---------------------------------------------------------------------------
  CreateFlowRequest:
    properties:
      name: string
      categories: list<FlowCategory>
      clone_flow_id: optional<string>
      endpoint_uri: optional<string>
      flow_json: optional<string>
      publish: optional<boolean>

  CreateFlowResponse:
    properties:
      id: string

  UpdateFlowMetadataRequest:
    properties:
      name: optional<string>
      categories: optional<list<FlowCategory>>
      endpoint_uri: optional<string>
      application_id: optional<string>

  UpdateFlowMetadataResponse:
    properties:
      success: boolean

  DeleteFlowResponse:
    properties:
      success: boolean

  GetFlowsQuery:
    properties:
      fields: optional<string>

  FlowPagingCursors:
    properties:
      before: string
      after: string

  FlowPaging:
    properties:
      cursors: FlowPagingCursors

  GetManyFlowsResponse:
    properties:
      data: list<FlowSummary>
      paging: FlowPaging

  UpdateFlowJsonResponse:
    properties:
      success: boolean
      validation_errors: list<FlowValidationError>

  PublishFlowResponse:
    properties:
      success: boolean

service:
  base-path: ""
  auth: true
  endpoints:
    createFlow:
      docs: Create a new WhatsApp Flow under a WABA account.
      url: graph
      path: /{wabaId}/flows
      method: POST
      path-parameters:
        wabaId:
          docs: WhatsApp Business Account ID
          type: string
      request:
        name: CreateFlowRequestWrapper
        body:
          properties:
            name: string
            categories: list<FlowCategory>
            clone_flow_id: optional<string>
            endpoint_uri: optional<string>
            flow_json: optional<string>
            publish: optional<boolean>
      response: CreateFlowResponse

    updateFlowMetadata:
      docs: Update name, categories, or endpoint URI of an existing flow.
      url: graph
      path: /{flowId}
      method: POST
      path-parameters:
        flowId: string
      request:
        name: UpdateFlowMetadataRequestWrapper
        body:
          properties:
            name: optional<string>
            categories: optional<list<FlowCategory>>
            endpoint_uri: optional<string>
            application_id: optional<string>
      response: UpdateFlowMetadataResponse

    listFlows:
      docs: List all flows under a WABA account.
      url: graph
      path: /{wabaId}/flows
      method: GET
      path-parameters:
        wabaId: string
      response: GetManyFlowsResponse

    getFlow:
      docs: Get a single flow by ID, optionally specifying fields.
      url: graph
      path: /{flowId}
      method: GET
      path-parameters:
        flowId: string
      request:
        name: GetFlowRequest
        query-parameters:
          fields: optional<string>
      response: FlowDetail

    deleteFlow:
      docs: Delete a flow permanently.
      url: graph
      path: /{flowId}
      method: DELETE
      path-parameters:
        flowId: string
      response: DeleteFlowResponse

    updateFlowJson:
      docs: Upload or replace the flow.json asset for a flow.
      url: graph
      path: /{flowId}/assets
      method: POST
      path-parameters:
        flowId: string
      request:
        name: UpdateFlowJsonRequest
        body:
          properties:
            name:
              type: literal<"flow.json">
            asset_type:
              type: literal<"FLOW_JSON">
            file: unknown
      response: UpdateFlowJsonResponse

    getFlowPreview:
      docs: >
        Get the web preview URL for a flow. The `fields` parameter controls
        whether the existing preview link is invalidated. The returned
        `preview_url` can then have interactive URL parameters (interactive,
        flow_token, flow_action, flow_action_payload, phone_number) appended
        by the caller.
      url: graph
      path: /{flowId}
      method: GET
      path-parameters:
        flowId: string
      request:
        name: GetFlowPreviewRequest
        query-parameters:
          fields:
            type: literal<"preview.invalidate(false)">
      response: FlowPreviewResponse

    publishFlow:
      docs: Publish a flow, making it available to send to users.
      url: graph
      path: /{flowId}/publish
      method: POST
      path-parameters:
        flowId: string
      response: PublishFlowResponse
