imports:
  common: common.yml
  flows: flows.yml

types:
  # ---------------------------------------------------------------------------
  # Incoming message types (from Message webhook)
  # ---------------------------------------------------------------------------
  WebhookContactObject:
    properties:
      wa_id: string
      profile: WebhookContactProfile

  WebhookContactProfile:
    properties:
      name: string

  WebhookMetadataObject:
    properties:
      display_phone_number: string
      phone_number_id: string

  WebhookConversationType:
    enum:
      - authentication
      - service
      - utility
      - marketing
      - referral_conversation

  WebhookMessageStatus:
    enum:
      - delivered
      - read
      - sent

  WebhookConversationOrigin:
    properties:
      type: WebhookConversationType

  WebhookConversation:
    properties:
      id: string
      origin: WebhookConversationOrigin
      expiration_timestamp: optional<long>

  WebhookPricing:
    properties:
      category: WebhookConversationType
      pricing_model:
        type: literal<"CBP">

  WebhookMessageStatusObject:
    properties:
      id: string
      biz_opaque_callback_data: optional<string>
      conversation: optional<WebhookConversation>
      errors: optional<common.Errors>
      pricing: optional<WebhookPricing>
      recipient_id: string
      status: WebhookMessageStatus
      timestamp: long

  WebhookMessageType:
    enum:
      - audio
      - button
      - document
      - text
      - image
      - interactive
      - order
      - sticker
      - system
      - unknown
      - video

  WebhookInteractiveType:
    enum:
      - button_reply
      - list_reply
      - nfm_reply

  WebhookButtonReply:
    properties:
      id: string
      title: string

  WebhookListReply:
    properties:
      id: string
      title: string
      description: string

  WebhookNfmReply:
    properties:
      response_json: string
      body: string
      name:
        type: literal<"flow">

  WebhookInteractiveObject:
    properties:
      type: WebhookInteractiveType
      button_reply: optional<WebhookButtonReply>
      list_reply: optional<WebhookListReply>
      nfm_reply: optional<WebhookNfmReply>

  WebhookProductItem:
    properties:
      product_retailer_id: string
      quantity: integer
      item_price: string
      currency: string

  WebhookOrderObject:
    properties:
      catalog_id: string
      text: string
      product_items: list<WebhookProductItem>

  WebhookReferralObject:
    properties:
      source_url: string
      source_type: string
      source_id: string
      headline: string
      body: string
      media_type: string
      image_url: optional<string>
      video_url: optional<string>
      thumbnail_url: optional<string>
      ctwa_clid: optional<string>

  WebhookStickerObject:
    properties:
      mime_type: string
      sha256: string
      id: string
      animated: optional<string>

  WebhookSystemObject:
    properties:
      body: string
      identity: optional<string>
      new_wa_id: optional<string>
      wa_id: optional<string>
      customer: optional<string>

  WebhookContextObject:
    properties:
      forwarded: optional<boolean>
      frequently_forwarded: optional<boolean>
      from: optional<string>
      id: optional<string>

  WebhookButtonObject:
    properties:
      payload: string
      text: string

  WebhookDocumentObject:
    properties:
      caption: optional<string>
      filename: string
      sha256: string
      mime_type: string
      id: string

  WebhookImageObject:
    properties:
      caption: optional<string>
      sha256: string
      id: string
      mime_type: string

  WebhookVideoObject:
    properties:
      id: string
      caption: optional<string>
      filename: optional<string>
      sha256: string
      mime_type: string

  WebhookAudioObject:
    properties:
      id: string
      mime_type: string

  WebhookIdentityObject:
    properties:
      acknowledged: boolean
      created_timestamp: long
      hash: string

  WebhookTextObject:
    properties:
      body: string

  WebhookMessageObject:
    properties:
      id: string
      from: string
      timestamp: long
      type: WebhookMessageType
      context: optional<WebhookContextObject>
      image: optional<WebhookImageObject>
      video: optional<WebhookVideoObject>
      interactive: optional<WebhookInteractiveObject>
      order: optional<WebhookOrderObject>
      referral: optional<WebhookReferralObject>
      sticker: optional<WebhookStickerObject>
      system: optional<WebhookSystemObject>
      text: optional<WebhookTextObject>
      identity: optional<WebhookIdentityObject>
      audio: optional<WebhookAudioObject>
      button: optional<WebhookButtonObject>
      document: optional<WebhookDocumentObject>
      errors: optional<common.Errors>

  # Message webhook
  WebhookMessageChangeValue:
    properties:
      messaging_product:
        type: literal<"whatsapp">
      metadata: WebhookMetadataObject
      contacts: optional<list<WebhookContactObject>>
      errors: optional<common.Errors>
      messages: optional<list<WebhookMessageObject>>
      statuses: optional<list<WebhookMessageStatusObject>>

  WebhookMessageChange:
    properties:
      value: WebhookMessageChangeValue
      field:
        type: literal<"messages">

  WebhookMessageEntry:
    properties:
      id: string
      changes: list<WebhookMessageChange>

  WebhookMessageBody:
    docs: Payload delivered by Meta to your webhook endpoint for incoming messages and status updates.
    properties:
      object:
        type: literal<"whatsapp_business_account">
      entry: list<WebhookMessageEntry>

  # Flows webhook
  WebhookFlowEncryptedBody:
    docs: >
      Encrypted payload delivered by Meta to your endpoint when a user interacts
      with a WhatsApp Flow. Decrypt using the business private key and the
      provided AES key.
    properties:
      encrypted_aes_key: string
      encrypted_flow_data: string
      initial_vector: string

  WebhookFlowDecryptedBody:
    docs: Decrypted contents of a WebhookFlowEncryptedBody.
    properties:
      version: string
      screen: string
      action: flows.FlowAction
      data: map<string, unknown>
      flow_token: string

  WebhookFlowResponse:
    properties:
      screen: string
      data: map<string, unknown>

  WebhookFlowPingResponse:
    properties:
      data: WebhookFlowPingData

  WebhookFlowPingData:
    properties:
      status:
        type: literal<"active">

webhooks:
  WebhookMessage:
    display-name: Message Webhook
    docs: >
      Incoming webhook from Meta containing messages, delivery statuses,
      and contact information for a WhatsApp Business number.
    method: POST
    payload: WebhookMessageBody

  WebhookFlow:
    display-name: Flows Webhook
    docs: >
      Incoming encrypted webhook from Meta when a user interacts with a
      WhatsApp Flow. The payload must be decrypted before use.
    method: POST
    payload: WebhookFlowEncryptedBody
